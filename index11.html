<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTechPhone - Auto-Scale Edition</title>
    <style>
        :root { --yt-red: #FF3B30; --ios-blue: #007AFF; --phone-ratio: 0.5; }
        
        /* AUTO-SCALE & CENTRAGE */
        body { 
            margin: 0; 
            background: #050505; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            touch-action: none;
        }

        /* LE CHÂSSIS AUTO-ADAPTATIF */
        .phone { 
            background: #1a1a1a; 
            border-radius: 50px; 
            border: 4px solid #333; 
            position: relative; 
            /* Calcul de taille basé sur la hauteur de l'écran pour garantir le fit */
            height: 90vh; 
            aspect-ratio: 1 / 2;
            max-width: 95vw;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            transition: transform 0.3s ease;
        }

        /* BOUTONS PHYSIQUES */
        .power-btn { position: absolute; right: -8px; top: 20%; width: 6px; height: 10%; background: #444; border-radius: 0 5px 5px 0; cursor: pointer; }
        .home-btn { position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%); width: 15%; aspect-ratio: 1/1; background: #111; border: 2px solid #333; border-radius: 50%; cursor: pointer; z-index: 3000; }

        /* ECRAN INTERNE */
        .screen { 
            width: 92%; 
            height: 92%; 
            background: #000; 
            border-radius: 35px; 
            margin: 4% auto; 
            overflow: hidden; 
            position: relative; 
            box-shadow: inset 0 0 10px #000;
        }

        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; z-index: 10; }
        .active { display: flex !important; }

        /* SETUP iOS STYLE */
        .setup-layer { background: white; color: black; text-align: center; }
        .hello-text { font-size: clamp(20px, 5vh, 32px); font-weight: 600; margin-top: 25%; animation: fadeHello 3s infinite; }
        @keyframes fadeHello { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        
        .ios-btn { background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto; }

        /* TOUCH ID UI */
        .finger-ring { width: clamp(50px, 15vh, 80px); height: clamp(50px, 15vh, 80px); border: 3px solid #E5E5EA; border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .finger-fill { position: absolute; inset: -3px; border: 4px solid #34C759; border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.05s linear; }

        /* DARK MODE SYSTEM */
        .dark-layer { background: #000; color: white; }
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20%; text-align: center; }
        .app-icon { width: clamp(40px, 10vh, 65px); height: clamp(40px, 10vh, 65px); border-radius: 18%; background: #222; display: flex; align-items: center; justify-content: center; font-size: clamp(20px, 5vh, 30px); margin: 0 auto 8px; cursor: pointer; }

        /* ANIMATIONS */
        .disintegrate { animation: dissolve 0.8s forwards; }
        @keyframes dissolve { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; filter: blur(20px); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="phone">
    <div class="power-btn" onclick="sysPower()"></div>
    <div class="home-btn" onclick="sysHome()"></div>

    <div class="screen">
        <div id="layer-boot" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <h1 style="color:var(--yt-red); font-size: clamp(18px, 4vh, 28px);">YouTechPhone</h1>
        </div>

        <div id="layer-setup-1" class="layer setup-layer">
            <div class="hello-text" id="hello-lang">Bonjour</div>
            <button class="ios-btn" onclick="showLayer('setup-2')">Continuer</button>
        </div>

        <div id="layer-setup-2" class="layer setup-layer">
            <h2 style="font-size: clamp(18px, 4vh, 24px);">Touch ID</h2>
            <p style="font-size: 13px; color: #666;">Touchez une fois pour enregistrer.</p>
            <div class="finger-ring" onclick="autoRegister()">
                <div id="setup-f-fill" class="finger-fill"></div>
                <span style="font-size:clamp(30px, 8vh, 45px);">🖐️</span>
            </div>
            <p id="setup-status" style="font-weight:600; color:#34C759; margin:0;">0%</p>
        </div>

        <div id="layer-lock" class="layer dark-layer" style="align-items:center; padding-top:20%;">
            <h2 style="font-size:clamp(30px, 8vh, 50px); margin:0; font-weight: 300;">12:00</h2>
            <div class="finger-ring" style="position:absolute; bottom:15%; border-color:#333;" onclick="autoUnlock()">
                <div id="lock-f-fill" class="finger-fill"></div>
                <span style="font-size:30px;">🖐️</span>
            </div>
        </div>

        <div id="layer-home" class="layer dark-layer">
            <div class="app-grid">
                <div id="a1" class="app-item" onclick="alert('SOS Active')"><div class="app-icon" style="background:#FF3B30">🆘</div><span style="font-size:12px;">SOS</span></div>
                <div id="a2" class="app-item" onclick="triggerBSOD()"><div class="app-icon" style="background:#004488">⚠️</div><span style="font-size:12px;">BSOD</span></div>
                <div id="a3" class="app-item" id="app-reset" onclick="factoryReset()"><div class="app-icon" style="background:#444">♻️</div><span style="font-size:12px;">Reset</span></div>
            </div>
        </div>

        <div id="layer-bsod" class="layer" style="background:#0078d7; color:white;">
            <div style="font-size:50px;">:(</div><p id="b-pc">0%</p>
        </div>

        <div id="layer-wipe" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <div style="border:3px solid #333; border-top-color:#fff; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite;"></div>
        </div>
    </div>
</div>

<script>
    let sys = { on: false, setup: false, locked: true };
    const langs = ["Bonjour", "Hello", "Hola", "Ciao", "Hallo"];
    let langIdx = 0;

    setInterval(() => {
        langIdx = (langIdx + 1) % langs.length;
        const el = document.getElementById('hello-lang');
        if(el) el.innerText = langs[langIdx];
    }, 2500);

    function sysPower() {
        if (!sys.on) {
            sys.on = true; showLayer('boot');
            setTimeout(() => { if(!sys.setup) showLayer('setup-1'); else showLayer('lock'); }, 1800);
        } else {
            showLayer('wipe');
            setTimeout(() => { sys.on = false; hide(); }, 1200);
        }
    }

    function autoRegister() {
        let p = 0;
        const fill = document.getElementById('setup-f-fill');
        const interval = setInterval(() => {
            p += 2;
            fill.style.clipPath = `inset(${100 - p}% 0 0 0)`;
            document.getElementById('setup-status').innerText = p + "%";
            if (p >= 100) { clearInterval(interval); setTimeout(() => { sys.setup = true; showLayer('lock'); }, 600); }
        }, 30);
    }

    function autoUnlock() {
        if (!sys.on || !sys.locked) return;
        let p = 0;
        const fill = document.getElementById('lock-f-fill');
        const interval = setInterval(() => {
            p += 4;
            fill.style.clipPath = `inset(${100 - p}% 0 0 0)`;
            if (p >= 100) { clearInterval(interval); sys.locked = false; showLayer('home'); fill.style.clipPath = `inset(100% 0 0 0)`; }
        }, 25);
    }

    function factoryReset() {
        if(!confirm("Réinitialiser le téléphone ?")) return;
        const apps = ['a1', 'a2', 'a3'];
        let i = 0;
        const iv = setInterval(() => {
            if(i < apps.length) { document.getElementById(apps[i]).classList.add('disintegrate'); i++; }
            else { clearInterval(iv); setTimeout(() => location.reload(), 800); }
        }, 600);
    }

    function triggerBSOD() {
        showLayer('bsod');
        let p = 0; const h = setInterval(() => { p+=10; document.getElementById('b-pc').innerText = p+"%"; if(p>=100){clearInterval(h); sysPower();} }, 300);
    }

    function sysHome() { if(sys.on && !sys.locked) showLayer('home'); }
    function showLayer(id) { hide(); document.getElementById('layer-' + id).classList.add('active'); }
    function hide() { document.querySelectorAll('.layer').forEach(l => l.classList.remove('active')); }
</script>
</body>
</html>

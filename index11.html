<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTechPhone - Audio & Security Edition</title>
    <style>
        :root { --yt-red: #FF0000; --ios-blue: #007AFF; --touch-green: #34C759; }
        body { margin: 0; background: #050505; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }

        .phone { background: #1a1a1a; border-radius: 50px; border: 4px solid #333; position: relative; height: 90vh; aspect-ratio: 1 / 2; max-width: 95vw; box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: transform 0.3s ease; }
        .power-btn { position: absolute; right: -8px; top: 20%; width: 6px; height: 10%; background: #444; border-radius: 0 5px 5px 0; cursor: pointer; z-index: 2000; }
        
        .screen { width: 92%; height: 92%; background: #000; border-radius: 35px; margin: 4% auto; overflow: hidden; position: relative; }
        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .active { display: flex !important; }

        /* INSTALLATION */
        .install-fill { width: 0%; height: 100%; background: var(--yt-red); transition: width 10s linear; }

        /* FACE ID */
        .faceid-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #333; margin: 20px auto; overflow: hidden; position: relative; background: #222; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; inset: 0; border: 3px solid var(--touch-green); border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.1s linear; }

        /* KEYPAD */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
        .key { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .key:active { background: rgba(255,255,255,0.3); }
        .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border: 1px solid white; border-radius: 50%; }
        .dot.filled { background: white; }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* APPS */
        .disintegrate { animation: dissolve 0.8s forwards; }
        @keyframes dissolve { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; filter: blur(20px); } }
    </style>
</head>
<body>

<div class="phone">
    <div class="power-btn" onclick="sysToggle()"></div>
    <div class="screen">
        <div id="layer-install" class="layer active" style="justify-content:center; align-items:center;">
            <div style="font-size: 50px; filter: grayscale(1);">🎬</div>
            <div style="width:70%; height:4px; background:#222; margin-top:20px;"><div id="install-fill" class="install-fill"></div></div>
            <p style="font-size:12px; margin-top:10px; color:#666;">YouTubeOS Setup...</p>
        </div>

        <div id="layer-boot" class="layer" style="justify-content:center; align-items:center;">
            <h1 style="color:red; letter-spacing: 3px;">YouTechPhone</h1>
        </div>

        <div id="layer-lock" class="layer" style="align-items:center; padding-top:40px;">
            <h2 style="font-size:40px; font-weight: 300; margin-bottom:40px;">19:03</h2>
            <div style="cursor:pointer; text-align:center;" onclick="tryFaceID()">
                <div class="faceid-box" style="border-color: var(--ios-blue);">
                    <video id="webcam" autoplay playsinline muted></video>
                    <div id="scan-lock" class="scan-line"></div>
                </div>
                <p style="font-size:14px; color:var(--ios-blue);">Face ID</p>
            </div>
        </div>

        <div id="layer-passcode" class="layer" style="align-items:center; justify-content:center; background: rgba(0,0,0,0.95);">
            <div class="dots" id="pass-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="keypad" id="keypad-box">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div class="key" style="visibility:hidden"></div><div class="key" onclick="pressKey('0')">0</div>
            </div>
        </div>

        <div id="layer-home" class="layer">
            <div id="app-reset" onclick="factoryReset()" style="text-align:center; margin-top:50px;">
                <div style="width:65px; height:65px; background:#444; border-radius:15px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer;">♻️</div>
                <span style="font-size:12px;">Reset System</span>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPass = "";
    const SECRET_CODE = "1503";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // --- MOTEUR AUDIO ---
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'startup') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(110, now);
            osc.frequency.exponentialRampToValueAtTime(440, now + 1.5);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.5);
            gain.gain.linearRampToValueAtTime(0, now + 2);
            osc.start(now); osc.stop(now + 2);
        } else if (type === 'shutdown') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 1);
            osc.start(now); osc.stop(now + 1);
        } else if (type === 'click') {
            osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        }
    }

    // --- LOGIQUE SYSTEME ---
    window.onload = () => {
        document.getElementById('install-fill').style.width = '100%';
        setTimeout(() => { 
            playSound('startup');
            showLayer('boot'); 
            setTimeout(() => showLayer('lock'), 2500);
        }, 10500);
    };

    function sysToggle() {
        playSound('shutdown');
        setTimeout(() => location.reload(), 1000);
    }

    async function tryFaceID() {
        const scan = document.getElementById('scan-lock');
        const video = document.getElementById('webcam');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            let p = 0;
            const iv = setInterval(() => {
                p += 5; scan.style.clipPath = `inset(${100-p}% 0 0 0)`;
                if(p >= 100) {
                    clearInterval(iv);
                    stream.getTracks().forEach(t => t.stop());
                    showLayer('passcode'); 
                }
            }, 50);
        } catch(e) { showLayer('passcode'); }
    }

    function pressKey(num) {
        if(currentPass.length < 4) {
            currentPass += num;
            updateDots();
            if(currentPass.length === 4) {
                if(currentPass === SECRET_CODE) {
                    playSound('click');
                    showLayer('home');
                } else {
                    document.getElementById('keypad-box').classList.add('shake');
                    setTimeout(() => {
                        document.getElementById('keypad-box').classList.remove('shake');
                        currentPass = ""; updateDots();
                    }, 400);
                }
            }
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => i < currentPass.length ? dot.classList.add('filled') : dot.classList.remove('filled'));
    }

    function factoryReset() {
        if(!confirm("Réinitialiser ?")) return;
        playSound('shutdown');
        document.getElementById('app-reset').classList.add('disintegrate');
        setTimeout(() => location.reload(), 1500);
    }

    function showLayer(id) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer-' + id).classList.add('active');
    }
</script>
</body>
</html>

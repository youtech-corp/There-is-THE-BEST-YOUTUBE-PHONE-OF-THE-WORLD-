<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTechPhone - FaceID Real Edition</title>
    <style>
        :root { --yt-red: #FF0000; --ios-blue: #007AFF; --ios-bg: #F2F2F7; --touch-green: #34C759; }
        
        body { margin: 0; background: #050505; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; color: black; }

        /* CHASSIS */
        .phone { background: #1a1a1a; border-radius: 50px; border: 4px solid #333; position: relative; height: 90vh; aspect-ratio: 1 / 2; max-width: 95vw; box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: transform 0.3s ease; }
        .power-btn { position: absolute; right: -8px; top: 20%; width: 6px; height: 10%; background: #444; border-radius: 0 5px 5px 0; cursor: pointer; z-index: 2000; }
        .home-btn { position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%); width: 15%; aspect-ratio: 1/1; background: #111; border: 2px solid #333; border-radius: 50%; cursor: pointer; z-index: 3000; }

        /* ECRAN */
        .screen { width: 92%; height: 92%; background: #000; border-radius: 35px; margin: 4% auto; overflow: hidden; position: relative; box-shadow: inset 0 0 10px #000; }
        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; z-index: 10; }
        .active { display: flex !important; }

        /* --- STYLES SYSTÈME (FONDS NOIRS) --- */
        .dark-layer { background: #000; color: white; }
        
        /* INSTALLATION YOUTUBEOS */
        #yt-logo { width: 40%; margin-bottom: 20px; }
        .install-bar { width: 80%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .install-fill { width: 0%; height: 100%; background: var(--yt-red); transition: width 10s linear; }

        /* BOOT LOGO */
        .boot-title { color: var(--yt-red); font-size: clamp(18px, 4vh, 28px); letter-spacing: 2px; text-align: center; }

        /* --- STYLES SETUP (FONDS BLANCS iOS) --- */
        .setup-layer { background: white; color: black; text-align: center; }
        .hello-text { font-size: clamp(24px, 5vh, 36px); font-weight: 600; margin-top: 25%; animation: fadeHello 3s infinite; }
        @keyframes fadeHello { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        .setup-desc { font-size: 14px; color: #666; margin-top: 10px; padding: 0 10px; }
        .ios-btn { background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto; }
        .ios-btn:active { opacity: 0.7; }

        /* FACE ID REAL SETUP */
        .faceid-container { width: clamp(120px, 30vh, 200px); height: clamp(120px, 30vh, 200px); border-radius: 50%; border: 4px solid #E5E5EA; margin: 30px auto; overflow: hidden; position: relative; background: #000; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } /* Mirror effect */
        .face-scanner { position: absolute; inset: 0; border-radius: 50%; box-shadow: 0 0 0 100px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2); }
        .scanning-circle { position: absolute; inset: 5px; border: 3px solid var(--touch-green); border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.1s linear; }

        /* INTERFACE CLASSIQUE (FONDS NOIRS) */
        .finger-ring { width: clamp(50px, 12vh, 70px); height: clamp(50px, 12vh, 70px); border: 3px solid #333; border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .finger-fill { position: absolute; inset: -3px; border: 4px solid var(--touch-green); border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.05s linear; }
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20%; text-align: center; }
        .app-icon { width: clamp(40px, 9vh, 60px); height: clamp(40px, 9vh, 60px); border-radius: 15px; background: #222; display: flex; align-items:center; justify-content:center; font-size: 30px; margin: 0 auto 8px; cursor: pointer; }

        /* AUTRES */
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="phone">
    <div class="power-btn" onclick="sysPower()"></div>
    <div class="home-btn" onclick="sysHome()"></div>

    <div class="screen" id="main-screen">
        <div id="layer-install" class="layer dark-layer active" style="justify-content:center; align-items:center;">
            <svg id="yt-logo" viewBox="0 0 576 400"><path fill="#FF0000" d="M549.655 124.083c-6.281-23.65-24.787-42.276-48.284-48.597C458.781 64 288 64 288 64S117.22 64 74.629 75.486c-23.497 6.322-42.003 24.947-48.284 48.597C15.122 166.669 15.122 256 15.122 256s0 89.331 11.223 131.917c6.281 23.65 24.787 41.504 48.284 47.825C117.22 448 288 448 288 448s170.781 0 213.371-11.258c23.497-6.321 42.003-24.175 48.284-47.825C560.878 345.331 560.878 256 560.878 256s0-89.331-11.223-131.917Z"/><path fill="#FFFFFF" d="m239.03 302.256 148.404-74.664L239.03 152.928v149.328Z"/></svg>
            <div class="install-bar"><div id="install-fill" class="install-fill"></div></div>
            <p style="font-size:10px; color:#aaa; margin-top:10px;">Installation de YouTubeOS...</p>
        </div>

        <div id="layer-boot" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <h1 class="boot-title">YouTechPhone</h1>
        </div>

        <div id="layer-setup-1" class="layer setup-layer">
            <div class="hello-text" id="hello-lang">Bonjour</div>
            <button class="ios-btn" onclick="showLayer('setup-2'); initFaceID();">Continuer</button>
        </div>

        <div id="layer-setup-2" class="layer setup-layer">
            <h2 style="font-size: 20px; margin:0;">Face ID</h2>
            <p class="setup-desc">Positionnez votre visage dans le cercle pour configurer la reconnaissance faciale YouTech.</p>
            
            <div class="faceid-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="face-scanner"></div>
                <div id="scan-circle" class="scanning-circle"></div>
            </div>
            
            <p id="face-status" style="font-weight:600; color:#34C759; margin:0;">Analyse...</p>
            <button class="ios-btn" id="face-continue" style="display:none;" onclick="finishSetup()">Terminer</button>
        </div>

        <div id="layer-lock" class="layer dark-layer" style="align-items:center; padding-top:20%;">
            <h2 style="font-size:clamp(30px, 8vh, 50px); margin:0; font-weight: 300;">12:00</h2>
            <div class="finger-ring" style="position:absolute; bottom:15%;" onclick="autoUnlock()">
                <div id="lock-f-fill" class="finger-fill"></div>
                <span style="font-size:30px;">🖐️</span>
            </div>
        </div>

        <div id="layer-home" class="layer dark-layer">
            <div class="app-grid">
                <div class="app-item"><div class="app-icon" style="background:#004488">⚠️</div><span style="font-size:12px;">App</span></div>
            </div>
        </div>

        <div id="layer-wipe" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <div style="border:3px solid #333; border-top-color:#fff; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite;"></div>
        </div>
    </div>
</div>

<script>
    let sys = { on: false, installed: false, setup: false, locked: true, camStream: null };

    // Initialisation automatique au chargement de la page
    window.onload = function() {
        startInstallation();
    };

    // --- 0. SÉQUENCE INSTALLATION ---
    function startInstallation() {
        const fill = document.getElementById('install-fill');
        setTimeout(() => {
            fill.style.width = '100%';
        }, 100);

        // Après 10 secondes d'installation
        setTimeout(() => {
            sys.installed = true;
            sysPower(); // Allume automatiquement le téléphone après l'install
        }, 10500);
    }

    function sysPower() {
        if (!sys.on) {
            sys.on = true;
            showLayer('boot');
            // Transition vers Setup ou Lock
            setTimeout(() => {
                if(!sys.setup) showLayer('setup-1');
                else showLayer('lock');
            }, 2000);
        } else {
            stopWebcam(); // Coupe la cam si elle tourne
            showLayer('wipe');
            setTimeout(() => { sys.on = false; hide(); }, 1200);
        }
    }

    // --- REAL FACE ID SETUP LOGIC ---
    async function initFaceID() {
        const video = document.getElementById('webcam');
        const status = document.getElementById('face-status');
        const circle = document.getElementById('scan-circle');
        const continueBtn = document.getElementById('face-continue');

        status.innerText = "Demande d'accès caméra...";
        status.style.color = "black";
        continueBtn.style.display = "none";
        circle.style.clipPath = "inset(100% 0 0 0)";

        try {
            // Requête d'accès à la caméra
            sys.camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = sys.camStream;
            
            status.innerText = "Analyse du visage...";
            status.style.color = "var(--touch-green)";

            // Simulation visuelle d'analyse (3 secondes)
            let p = 0;
            const h = setInterval(() => {
                p += 4;
                circle.style.clipPath = `inset(${100 - p}% 0 0 0)`;
                
                if(p >= 100) {
                    clearInterval(h);
                    status.innerText = "Visage Enregistré";
                    continueBtn.style.display = "block";
                    stopWebcam(); // Coupe la cam une fois fini
                }
            }, 120);

        } catch (err) {
            console.error("Face ID Error:", err);
            status.innerText = "Erreur caméra. Vérifiez les autorisations.";
            status.style.color = "red";
            // Bouton de secours si la cam échoue
            setTimeout(() => {
                continueBtn.style.display = "block";
                continueBtn.innerText = "Continuer sans Face ID";
            }, 2000);
        }
    }

    function stopWebcam() {
        if (sys.camStream) {
            sys.camStream.getTracks().forEach(track => track.stop());
            sys.camStream = null;
        }
    }

    function finishSetup() {
        sys.setup = true;
        showLayer('lock');
    }

    // --- UNLOCK LOGIC ---
    function autoUnlock() {
        if (!sys.on || !sys.locked) return;
        let p = 0;
        const fill = document.getElementById('lock-f-fill');
        const interval = setInterval(() => {
            p += 4;
            fill.style.clipPath = `inset(${100 - p}% 0 0 0)`;
            if (p >= 100) {
                clearInterval(interval);
                sys.locked = false;
                showLayer('home');
                fill.style.clipPath = `inset(100% 0 0 0)`;
            }
        }, 25);
    }

    // UTILS
    function showLayer(id) { hide(); document.getElementById('layer-' + id).classList.add('active'); }
    function hide() { document.querySelectorAll('.layer').forEach(l => l.classList.remove('active')); }
    function sysHome() { if(sys.on && !sys.locked) showLayer('home'); }

</script>
</body>
</html>

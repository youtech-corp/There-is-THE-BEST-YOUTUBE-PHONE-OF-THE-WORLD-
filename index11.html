<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTechPhone - Secure FaceID</title>
    <style>
        :root { --yt-red: #FF0000; --ios-blue: #007AFF; --touch-green: #34C759; }
        body { margin: 0; background: #050505; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }

        .phone { background: #1a1a1a; border-radius: 50px; border: 4px solid #333; position: relative; height: 90vh; aspect-ratio: 1 / 2; max-width: 95vw; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .screen { width: 92%; height: 92%; background: #000; border-radius: 35px; margin: 4% auto; overflow: hidden; position: relative; }
        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .active { display: flex !important; }

        /* INSTALLATION */
        .install-fill { width: 0%; height: 100%; background: var(--yt-red); transition: width 10s linear; }

        /* FACE ID UI */
        .faceid-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #333; margin: 20px auto; overflow: hidden; position: relative; background: #222; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; inset: 0; border: 3px solid var(--touch-green); border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.1s linear; }

        /* KEYPAD (CODE 1503) */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
        .key { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .key:active { background: rgba(255,255,255,0.3); }
        .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border: 1px solid white; border-radius: 50%; }
        .dot.filled { background: white; }
        
        /* ANIMATION ERREUR */
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* APPS DISINTEGRATION */
        .disintegrate { animation: dissolve 0.8s forwards; }
        @keyframes dissolve { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; filter: blur(20px); } }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen">
        <div id="layer-install" class="layer active" style="justify-content:center; align-items:center;">
            <div style="font-size: 40px;">🎬</div>
            <div style="width:70%; height:4px; background:#222; margin-top:20px;"><div id="install-fill" class="install-fill"></div></div>
            <p style="font-size:12px; margin-top:10px;">YouTubeOS Installation...</p>
        </div>

        <div id="layer-lock" class="layer" style="align-items:center; padding-top:40px;">
            <h2 style="font-size:40px; font-weight: 300; margin-bottom:40px;">19:03</h2>
            <div id="face-trigger" style="cursor:pointer; text-align:center;" onclick="tryFaceID()">
                <div class="faceid-box" style="border-color: var(--ios-blue);">
                    <video id="webcam" autoplay playsinline muted></video>
                    <div id="scan-lock" class="scan-line"></div>
                </div>
                <p style="font-size:14px; color:var(--ios-blue);">Cliquer pour Face ID</p>
            </div>
        </div>

        <div id="layer-passcode" class="layer" style="align-items:center; justify-content:center; background: rgba(0,0,0,0.9);">
            <p>Entrez le code</p>
            <div class="dots" id="pass-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="keypad" id="keypad-box">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div class="key" style="visibility:hidden"></div><div class="key" onclick="pressKey('0')">0</div>
            </div>
            <p style="margin-top:30px; font-size:12px; color:gray;" onclick="showLayer('lock')">Annuler</p>
        </div>

        <div id="layer-home" class="layer">
            <div id="app-reset" onclick="factoryReset()" style="text-align:center; margin-top:50px;">
                <div style="width:65px; height:65px; background:#444; border-radius:15px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer;">♻️</div>
                <span>Reset</span>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPass = "";
    const SECRET_CODE = "1503";

    // Auto-installation au démarrage
    window.onload = () => {
        document.getElementById('install-fill').style.width = '100%';
        setTimeout(() => { showLayer('lock'); }, 10500);
    };

    async function tryFaceID() {
        const scan = document.getElementById('scan-lock');
        const video = document.getElementById('webcam');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            let p = 0;
            const iv = setInterval(() => {
                p += 5;
                scan.style.clipPath = `inset(${100-p}% 0 0 0)`;
                if(p >= 100) {
                    clearInterval(iv);
                    stream.getTracks().forEach(t => t.stop());
                    // Simule un échec aléatoire pour forcer le code (ou 100% échec pour test)
                    failFaceID(); 
                }
            }, 50);
        } catch(e) {
            failFaceID();
        }
    }

    function failFaceID() {
        // En cas d'échec Face ID, on demande le code
        showLayer('passcode');
    }

    function pressKey(num) {
        if(currentPass.length < 4) {
            currentPass += num;
            updateDots();
            if(currentPass.length === 4) {
                if(currentPass === SECRET_CODE) {
                    showLayer('home');
                } else {
                    const box = document.getElementById('keypad-box');
                    box.classList.add('shake');
                    setTimeout(() => {
                        box.classList.remove('shake');
                        currentPass = "";
                        updateDots();
                    }, 400);
                }
            }
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            if(i < currentPass.length) dot.classList.add('filled');
            else dot.classList.remove('filled');
        });
    }

    function factoryReset() {
        if(!confirm("Purge complète ?")) return;
        document.getElementById('app-reset').classList.add('disintegrate');
        setTimeout(() => location.reload(), 1000);
    }

    function showLayer(id) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer-' + id).classList.add('active');
        currentPass = "";
        updateDots();
    }
</script>
</body>
</html>

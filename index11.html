<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTech B Fold 1 - Final OS</title>
    <style>
        :root { --yt-red: #FF0000; --ios-blue: #007AFF; --glass: rgba(255,255,255,0.1); }
        body { margin: 0; background: #050505; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; user-select: none; }

        /* --- CHASSIS --- */
        .phone-frame { 
            background: #1a1a1a; border-radius: 40px; border: 4px solid #333; position: relative; 
            height: 85vh; width: 300px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; box-shadow: 0 0 60px rgba(0,0,0,1); z-index: 10;
        }
        .phone-frame.unfolded { width: 620px; }

        /* --- BOUTONS PHYSIQUES --- */
        .btn-top { position: absolute; left: 50%; top: -10px; width: 70px; height: 10px; background: #444; border-radius: 5px 5px 0 0; transform: translateX(-50%); cursor: pointer; z-index: 9999; border: 1px solid #222; }
        .btn-top:active { background: #666; }
        
        .btn-fold { position: absolute; right: -10px; top: 40%; width: 12px; height: 90px; background: var(--yt-red); border-radius: 0 8px 8px 0; cursor: pointer; z-index: 9999; }

        /* --- DISPLAY --- */
        .display-area { position: absolute; inset: 10px; background: #000; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; width: calc(100% - 20px); height: calc(100% - 20px); }
        
        .status-bar { height: 25px; padding: 5px 20px 0; display: flex; justify-content: space-between; font-size: 11px; z-index: 5000; background: rgba(0,0,0,0.5); visibility: hidden; }
        
        .layer { position: absolute; inset: 0; top: 0; display: none; flex-direction: column; background: #000; z-index: 20; box-sizing: border-box; }
        .active { display: flex !important; }

        /* --- POWER MENU (ÉCRAN D'ARRÊT) --- */
        .power-menu { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        .power-btn { width: 200px; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-shutdown { background: #ff3b30; color: white; }
        .btn-restart { background: #333; color: white; }

        /* --- BOUTON HOME (CERCLE) --- */
        .home-button-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 7000; display: none; }
        .home-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .home-circle:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        /* --- APPS --- */
        #l-home { padding-top: 30px; }
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; }
        .unfolded .app-grid { grid-template-columns: repeat(4, 1fr); }
        .app-icon { width: 60px; height: 60px; border-radius: 15px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; background: var(--glass); }

        /* --- WEB --- */
        #web-iframe { width: 100%; height: calc(100% - 100px); border: none; background: white; }
    </style>
</head>
<body>

<div class="phone-frame" id="frame">
    <div class="btn-top" onclick="togglePowerMenu()"></div>
    <div class="btn-fold" onclick="hwFold()"></div>

    <div class="power-menu" id="p-menu">
        <h2 style="margin-bottom:20px;">YouTech OS</h2>
        <button class="power-btn btn-shutdown" onclick="sysAction('shutdown')">Éteindre ⏻</button>
        <button class="power-btn btn-restart" onclick="sysAction('restart')">Redémarrer ↻</button>
        <p style="cursor:pointer; margin-top:10px;" onclick="togglePowerMenu()">Annuler</p>
    </div>

    <div class="display-area">
        <div class="status-bar" id="sb">
            <span id="time">14:35</span>
            <span>📶 🔋 85%</span>
        </div>

        <div id="l-off" class="layer active" style="background:black;"></div>
        
        <div id="l-boot" class="layer" style="justify-content:center; align-items:center;">
            <b>YOUTECH</b><br><span style="color:red">B FOLD 1</span>
        </div>

        <div id="l-lock" class="layer" style="justify-content:center; align-items:center;">
            <div onclick="unlock()" style="font-size:60px; cursor:pointer;">🔓</div>
            <p>Déverrouiller</p>
        </div>

        <div id="l-home" class="layer">
            <div class="app-grid">
                <div class="app-icon" style="background:var(--ios-blue)" onclick="render('web')">🌐</div>
                <div class="app-icon" style="background:var(--yt-red)" onclick="render('studio')">🎬</div>
                <div class="app-icon">📸</div>
                <div class="app-icon" style="background:#333">⚙️</div>
            </div>
        </div>

        <div id="l-web" class="layer">
            <div style="background:#f1f1f1; color:black; padding:10px; display:flex; gap:10px;">
                <input type="text" id="web-url" value="Wikipedia" style="flex:1; border-radius:5px; border:1px solid #ccc; padding:3px 10px;">
                <button onclick="webGo()" style="background:var(--ios-blue); color:white; border:none; border-radius:5px; padding:0 10px;">Aller</button>
            </div>
            <iframe id="web-iframe" src="about:blank"></iframe>
        </div>

        <div class="home-button-container" id="home-container">
            <div class="home-circle" onclick="goHome()"></div>
        </div>
    </div>
</div>

<script>
    let sys = { power: false, unlocked: false };

    function togglePowerMenu() {
        if(!sys.power) { 
            // Si éteint, on lance le boot
            sys.power = true; 
            render('boot'); 
            setTimeout(() => render('lock'), 2500); 
        } else {
            // Si allumé, on affiche le menu d'extinction
            const menu = document.getElementById('p-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
    }

    function sysAction(action) {
        if(action === 'shutdown') {
            document.getElementById('p-menu').style.display = 'none';
            document.getElementById('home-container').style.display = 'none';
            document.getElementById('sb').style.visibility = 'hidden';
            sys.power = false;
            sys.unlocked = false;
            render('off');
        } else {
            location.reload();
        }
    }

    function hwFold() { document.getElementById('frame').classList.toggle('unfolded'); }

    function unlock() { 
        sys.unlocked = true; 
        render('home'); 
        document.getElementById('sb').style.visibility = 'visible';
        document.getElementById('home-container').style.display = 'block';
    }

    function goHome() {
        if(sys.unlocked) {
            render('home');
            document.getElementById('p-menu').style.display = 'none';
        }
    }

    function render(id) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('l-' + id).classList.add('active');
    }

    function webGo() {
        let q = document.getElementById('web-url').value;
        document.getElementById('web-iframe').src = `https://fr.m.wikipedia.org/wiki/${encodeURIComponent(q)}`;
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('time').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTechPhone - Pin Setup Edition</title>
    <style>
        :root { --yt-red: #FF0000; --ios-blue: #007AFF; --touch-green: #34C759; }
        body { margin: 0; background: #050505; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: black; }

        .phone { background: #1a1a1a; border-radius: 50px; border: 4px solid #333; position: relative; height: 90vh; aspect-ratio: 1 / 2; max-width: 95vw; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .screen { width: 92%; height: 92%; background: #000; border-radius: 35px; margin: 4% auto; overflow: hidden; position: relative; }
        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .active { display: flex !important; }

        /* SETUP STYLES */
        .setup-white { background: white; color: black; text-align: center; }
        .ios-btn { background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto; }
        
        /* PIN DOTS */
        .dots { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .dot { width: 15px; height: 15px; border: 1px solid #333; border-radius: 50%; transition: 0.2s; }
        .setup-white .dot { border-color: #999; }
        .dot.filled { background: #333; border-color: #333; }

        /* KEYPAD */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 250px; margin: 0 auto; }
        .key { width: 60px; height: 60px; background: #f2f2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .key:active { background: #d1d1d6; }

        /* DARK KEYPAD (FOR UNLOCK) */
        .dark-layer .key { background: rgba(255,255,255,0.1); color: white; }
        .dark-layer .dot { border-color: white; }
        .dark-layer .dot.filled { background: white; }

        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        /* SCAN UI */
        .bio-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #eee; margin: 20px auto; overflow: hidden; position: relative; }
        .scan-fill { position: absolute; inset: 0; border: 4px solid var(--touch-green); border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.1s linear; }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen">
        <div id="layer-install" class="layer active" style="background:#000; justify-content:center; align-items:center;">
            <div style="font-size: 40px;">🎬</div>
            <div style="width:70%; height:4px; background:#222; margin-top:20px;"><div id="install-fill" style="width:0%; height:100%; background:red; transition:10s linear;"></div></div>
        </div>

        <div id="layer-hello" class="layer setup-white">
            <h1 style="margin-top:30%;">Bonjour</h1>
            <button class="ios-btn" onclick="showLayer('setup-face')">Configurer Face ID</button>
        </div>

        <div id="layer-setup-face" class="layer setup-white">
            <h2>Face ID</h2>
            <div class="bio-box" style="background:#000;"><video id="v" style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1);" autoplay muted></video><div id="f-face" class="scan-fill"></div></div>
            <button class="ios-btn" onclick="startBio('face')">Démarrer le scan</button>
        </div>

        <div id="layer-setup-pin" class="layer setup-white">
            <h2 id="pin-title">Créer un code</h2>
            <p id="pin-desc">Un code protège vos données YouTech.</p>
            <div class="dots" id="setup-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="keypad" id="setup-keypad">
                <div class="key" onclick="pressSetupKey('1')">1</div><div class="key" onclick="pressSetupKey('2')">2</div><div class="key" onclick="pressSetupKey('3')">3</div>
                <div class="key" onclick="pressSetupKey('4')">4</div><div class="key" onclick="pressSetupKey('5')">5</div><div class="key" onclick="pressSetupKey('6')">6</div>
                <div class="key" onclick="pressSetupKey('7')">7</div><div class="key" onclick="pressSetupKey('8')">8</div><div class="key" onclick="pressSetupKey('9')">9</div>
                <div class="key" style="visibility:hidden"></div><div class="key" onclick="pressSetupKey('0')">0</div>
            </div>
        </div>

        <div id="layer-home" class="layer" style="background:#000; color:white; justify-content:center; align-items:center;">
            <div style="text-align:center;">
                <div style="font-size:50px;">✅</div>
                <p>YouTechPhone Configuré</p>
                <button class="ios-btn" onclick="location.reload()">Réinitialiser (Reset)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let tempPin = "";
    let finalPin = "";
    let step = 1; // 1: Création, 2: Confirmation

    function playSound(t) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        if(t==='scan'){ o.type='square'; o.frequency.setValueAtTime(800, audioCtx.currentTime); g.gain.setValueAtTime(0.01, audioCtx.currentTime); }
        if(t==='error'){ o.frequency.setValueAtTime(120, audioCtx.currentTime); g.gain.setValueAtTime(0.2, audioCtx.currentTime); }
        if(t==='success'){ o.frequency.setValueAtTime(500, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime+0.2); }
        o.start(); o.stop(audioCtx.currentTime+0.2);
    }

    window.onload = () => {
        document.getElementById('install-fill').style.width = '100%';
        setTimeout(() => showLayer('hello'), 10500);
    };

    async function startBio(type) {
        const fill = document.getElementById('f-face');
        let s = await navigator.mediaDevices.getUserMedia({video:true});
        document.getElementById('v').srcObject = s;
        let p = 0;
        const iv = setInterval(() => {
            p+=2; playSound('scan'); fill.style.clipPath = `inset(${100-p}% 0 0 0)`;
            if(p>=100){ clearInterval(iv); s.getTracks().forEach(t=>t.stop()); showLayer('setup-pin'); }
        }, 50);
    }

    function pressSetupKey(n) {
        tempPin += n;
        updateDots();
        if(tempPin.length === 4) {
            if(step === 1) {
                finalPin = tempPin;
                tempPin = "";
                step = 2;
                setTimeout(() => {
                    document.getElementById('pin-title').innerText = "Confirmez votre code";
                    updateDots();
                }, 300);
            } else {
                if(tempPin === finalPin) {
                    playSound('success');
                    showLayer('home');
                } else {
                    playSound('error');
                    document.getElementById('setup-dots').classList.add('shake');
                    setTimeout(() => {
                        document.getElementById('setup-dots').classList.remove('shake');
                        tempPin = "";
                        updateDots();
                    }, 400);
                }
            }
        }
    }

    function updateDots() {
        const ds = document.querySelectorAll('#setup-dots .dot');
        ds.forEach((d, i) => i < tempPin.length ? d.classList.add('filled') : d.classList.remove('filled'));
    }

    function showLayer(id) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer-' + id).classList.add('active');
    }
</script>
</body>
</html>

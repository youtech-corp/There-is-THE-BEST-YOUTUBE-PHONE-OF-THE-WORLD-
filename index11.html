<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTechPhone - iOS Setup Edition</title>
    <style>
        :root { --yt-red: #FF3B30; --ios-blue: #007AFF; --ios-bg: #F2F2F7; }
        body { margin: 0; background: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: black; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* CHASSIS YOUTECHPHONE */
        .phone { background: #1a1a1a; border-radius: 50px; border: 4px solid #333; position: relative; width: 320px; height: 640px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .power-btn { position: absolute; right: -8px; top: 120px; width: 6px; height: 60px; background: #444; border-radius: 0 5px 5px 0; cursor: pointer; }
        .home-btn { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; background: #111; border: 2px solid #333; border-radius: 50%; cursor: pointer; z-index: 3000; }

        /* ECRAN */
        .screen { width: 92%; height: 90%; background: #000; border-radius: 30px; margin: 12px auto; overflow: hidden; position: relative; }
        .layer { position: absolute; inset: 0; display: none; flex-direction: column; padding: 30px; box-sizing: border-box; z-index: 10; }
        .active { display: flex !important; }

        /* --- STYLE IOS SETUP (BLANC) --- */
        .setup-layer { background: white; color: black; text-align: center; }
        .hello-text { font-size: 32px; font-weight: 600; margin-top: 100px; animation: fadeHello 3s infinite; }
        @keyframes fadeHello { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        
        .ios-btn { background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto; }
        .ios-btn:active { opacity: 0.7; }

        /* TOUCH ID SETUP */
        .finger-icon { font-size: 60px; margin: 40px auto; color: #8E8E93; position: relative; }
        .finger-progress { position: absolute; inset: -10px; border: 4px solid #E5E5EA; border-radius: 50%; }
        .finger-fill { position: absolute; inset: -10px; border: 4px solid #34C759; border-radius: 50%; clip-path: inset(100% 0 0 0); transition: clip-path 0.4s ease; }

        /* --- INTERFACE SYSTEME (NOIR) --- */
        .dark-layer { background: #000; color: white; }
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
        .app-item { text-align: center; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* PURGE */
        .disintegrate { animation: dissolve 0.8s forwards; }
        @keyframes dissolve { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; filter: blur(20px); } }
    </style>
</head>
<body>

<div class="phone">
    <div class="power-btn" onclick="sysPower()"></div>
    <div class="home-btn" onclick="sysHome()"></div>

    <div class="screen">
        <div id="layer-boot" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <h1 style="color:var(--yt-red); font-size: 28px;">YouTechPhone</h1>
        </div>

        <div id="layer-setup-1" class="layer setup-layer">
            <div class="hello-text" id="hello-lang">Bonjour</div>
            <p style="color: #8E8E93; font-size: 14px; margin-top: 20px;">Faites glisser pour configurer</p>
            <button class="ios-btn" onclick="showLayer('setup-2')">Continuer</button>
        </div>

        <div id="layer-setup-2" class="layer setup-layer">
            <h2 style="font-size: 24px; margin-top: 20px;">Touch ID</h2>
            <p style="color: #333; font-size: 14px;">Posez votre doigt sur le capteur pour enregistrer votre empreinte.</p>
            <div class="finger-icon" onclick="regFinger()">
                <div class="finger-progress"></div>
                <div id="f-fill" class="finger-fill"></div>
                🖐️
            </div>
            <p id="f-status" style="font-size: 13px; font-weight: 600; color: #34C759;">0% terminé</p>
        </div>

        <div id="layer-lock" class="layer dark-layer" style="align-items:center; padding-top:60px;">
            <h2 style="font-size:45px; margin:0; font-weight: 300;">10:00</h2>
            <div style="position:absolute; bottom:60px;" onmousedown="startScan()" onmouseup="stopScan()">
                <div style="width:65px; height:65px; border:2px solid #333; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                    <div id="lock-fill" style="position:absolute; width:100%; height:100%; border:3px solid #34C759; border-radius:50%; clip-path:inset(100% 0 0 0);"></div>
                    <span style="font-size:30px;">🖐️</span>
                </div>
            </div>
        </div>

        <div id="layer-home" class="layer dark-layer">
            <div class="app-grid">
                <div class="app-item" id="app1" onclick="alert('SOS')"><div class="app-icon" style="background:linear-gradient(#FF5E5E, #FF3B30)">🆘</div><span>SOS</span></div>
                <div class="app-item" id="app2" onclick="triggerBSOD()"><div class="app-icon" style="background:#004488">⚠️</div><span>BSOD</span></div>
                <div class="app-item" id="app3" onclick="factoryReset()"><div class="app-icon" style="background:#555">♻️</div><span>Reset</span></div>
            </div>
        </div>

        <div id="layer-bsod" class="layer" style="background:#0078d7; color:white;">
            <div style="font-size:60px;">:(</div><p>ERROR</p><p id="b-pc">0%</p>
        </div>
        <div id="layer-wipe" class="layer dark-layer" style="justify-content:center; align-items:center;">
            <div style="border:3px solid #222; border-top-color:#fff; border-radius:50%; width:35px; height:35px; animation:spin 1s linear infinite;"></div>
        </div>
    </div>
</div>

<script>
    let sys = { on: false, setup: false, progress: 0, locked: true };
    const langs = ["Bonjour", "Hello", "Hola", "Ciao", "Hallo"];
    let langIdx = 0;

    // Cycle des langues "Hello"
    setInterval(() => {
        langIdx = (langIdx + 1) % langs.length;
        const el = document.getElementById('hello-lang');
        if(el) el.innerText = langs[langIdx];
    }, 3000);

    function sysPower() {
        if (!sys.on) {
            sys.on = true;
            showLayer('boot');
            setTimeout(() => {
                if(!sys.setup) showLayer('setup-1');
                else showLayer('lock');
            }, 1800);
        } else {
            showLayer('wipe');
            setTimeout(() => { sys.on = false; hide(); }, 1200);
        }
    }

    function regFinger() {
        sys.progress += 25;
        document.getElementById('f-fill').style.clipPath = `inset(${100 - sys.progress}% 0 0 0)`;
        document.getElementById('f-status').innerText = sys.progress + "% terminé";
        if(sys.progress >= 100) {
            setTimeout(() => { sys.setup = true; showLayer('lock'); }, 600);
        }
    }

    function startScan() {
        if(!sys.on || !sys.locked) return;
        let p = 0;
        sys.scanT = setInterval(() => {
            p += 5;
            document.getElementById('lock-fill').style.clipPath = `inset(${100-p}% 0 0 0)`;
            if(p >= 100) { clearInterval(sys.scanT); sys.locked = false; showLayer('home'); }
        }, 40);
    }
    function stopScan() { clearInterval(sys.scanT); document.getElementById('lock-fill').style.clipPath = `inset(100% 0 0 0)`; }

    function factoryReset() {
        if(!confirm("Réinitialiser l'iPhone ?")) return;
        const apps = ['app1', 'app2', 'app3'];
        let i = 0;
        const iv = setInterval(() => {
            if(i < apps.length) { document.getElementById(apps[i]).classList.add('disintegrate'); i++; }
            else { clearInterval(iv); setTimeout(() => location.reload(), 1000); }
        }, 600);
    }

    function triggerBSOD() {
        showLayer('bsod');
        let p = 0; const h = setInterval(() => { p+=10; document.getElementById('b-pc').innerText = p+"%"; if(p>=100){clearInterval(h); sysPower();} }, 300);
    }

    function sysHome() { if(sys.on && !sys.locked) showLayer('home'); }
    function showLayer(id) { hide(); document.getElementById('layer-' + id).classList.add('active'); }
    function hide() { document.querySelectorAll('.layer').forEach(l => l.classList.remove('active')); }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
